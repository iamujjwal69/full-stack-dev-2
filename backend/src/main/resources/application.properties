# Server Port (Railway uses the PORT environment variable)
server.port=${PORT:5000}

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:experiment7db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Initialize database with data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Dynamic CORS Origin (set ALLOWED_ORIGIN in Railway/Production)
app.allowed-origin=${ALLOWED_ORIGIN:http://localhost:5173}
